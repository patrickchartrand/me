<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.ico" />
    <title>Patrick Chartrand - Frontend Developer & UI Systems Specialist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.FontAwesomeConfig = { autoReplaceSvg: 'nest' }
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: '#F5F3EF',
              charcoal: '#1A1A1A',
              secondary: '#8A8A8A',
              primary: '#3d405b',
              accent: '#e07a5f',
              available: '#57cc99',
            },
            fontFamily: {
              serif: ['Playfair Display', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            spacing: {
              128: '32rem',
            },
          },
        },
      }
    </script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <style>
      /*
       * ─── Color Tokens ───
       * Tailwind colors are defined in tailwind.config above.
       * Only colors needed by scoped CSS (outside Tailwind) live here.
       */
      :root {
        --color-lavender: #9d9fbd;
        --color-available: #81b29a;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f5f3ef; /* cream */
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #999;
      }
      .reveal-text {
        animation: reveal 1s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
      }
      @keyframes reveal {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
